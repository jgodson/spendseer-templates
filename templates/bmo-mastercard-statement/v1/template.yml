import_template:
  name: BMO Mastercard
  target_type: transactions
  source_type: csv
  field_mappings:
    date: Posting Date
    description: Description
    amount: Transaction Amount
  csv_options:
    delimiter: ","
    quote_char: '"'
    skip_rows: 2
  transform_rules:
    amount_sign: as_is
    category_type_default: expense
  metadata:
    community_slug: bmo-mastercard-statement
    community_version: v1
