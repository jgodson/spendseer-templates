import_template:
  name: Budget Example CSV
  target_type: budgets
  source_type: csv
  field_mappings:
    year: Year
    month: Month
    amount: Amount
    category_name: Category
    category_type: Type
  csv_options:
    delimiter: ","
    quote_char: '"'
  transform_rules:
    amount_sign: as_is
    category_type_default: expense
  metadata:
    community_slug: budget-example
    community_version: v1
