import_template:
  name: Wealthsimple Transactions CSV
  target_type: transactions
  source_type: csv
  field_mappings:
    date: Date
    description: Description
    amount: Amount
    category_name: Category
  csv_options:
    delimiter: ","
    quote_char: '"'
  transform_rules:
    amount_sign: negate
    category_type_default: expense
  metadata:
    community_slug: wealthsimple-transactions
    community_version: v1
